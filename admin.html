<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Freezing Point</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#e11d48', darkbg: '#09090b', panel: '#18181b' } } }
        }
    </script>
</head>
<body class="bg-darkbg text-white font-sans antialiased p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-white">Admin Dashboard</h1>
            <button onclick="loadOrders()" class="bg-panel border border-zinc-700 px-4 py-2 rounded-lg text-sm hover:bg-zinc-800">Refresh <i class="fa-solid fa-rotate-right ml-2"></i></button>
        </div>

        <div class="bg-panel border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-zinc-900 border-b border-zinc-800 text-gray-400 text-sm uppercase tracking-wider">
                    <tr>
                        <th class="p-4">Order ID</th>
                        <th class="p-4">Customer</th>
                        <th class="p-4">Items</th>
                        <th class="p-4">Total (₹)</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="order-table" class="divide-y divide-zinc-800/50 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadOrders() {
            const table = document.getElementById('order-table');
            let orders = JSON.parse(localStorage.getItem('fp_orders')) || [];

            if (orders.length === 0) {
                table.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">No orders yet. Go to the customer page to place an order!</td></tr>`;
                return;
            }

            table.innerHTML = orders.map(order => `
                <tr class="hover:bg-zinc-800/30 transition">
                    <td class="p-4 text-gray-400 text-xs font-mono">${order.id}</td>
                    <td class="p-4">
                        <div class="font-bold text-white">${order.customer}</div>
                        <div class="text-gray-500 text-xs">${order.phone}</div>
                    </td>
                    <td class="p-4 text-gray-300 max-w-xs truncate">${order.items}</td>
                    <td class="p-4 font-bold text-brand">₹${order.total}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${
                            order.status === 'PENDING' ? 'bg-orange-500/20 text-orange-400' :
                            order.status === 'PREPARING' ? 'bg-blue-500/20 text-blue-400' :
                            'bg-green-500/20 text-green-400'
                        }">
                            ${order.status}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        ${order.status === 'PENDING' ? 
                            `<button onclick="updateStatus('${order.id}', 'PREPARING')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition">Prepare</button>` : 
                        order.status === 'PREPARING' ? 
                            `<button onclick="updateStatus('${order.id}', 'COMPLETED')" class="bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition">Complete</button>` : 
                            `<span class="text-gray-500 text-xs"><i class="fa-solid fa-check"></i> Done</span>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        function updateStatus(id, newStatus) {
            let orders = JSON.parse(localStorage.getItem('fp_orders')) || [];
            let orderIndex = orders.findIndex(o => o.id === id);
            if (orderIndex > -1) {
                orders[orderIndex].status = newStatus;
                localStorage.setItem('fp_orders', JSON.stringify(orders));
                loadOrders(); // Refresh table
            }
        }

        // Load initially and refresh every 3 seconds to act like real-time
        loadOrders();
        setInterval(loadOrders, 3000);
    </script>
</body>
</html>
