<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freezing Point</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#e11d48', darkbg: '#09090b', panel: '#18181b' } } }
        }
    </script>
</head>
<body class="bg-darkbg text-white font-sans antialiased">

    <nav class="flex justify-between items-center px-8 py-4 border-b border-zinc-800">
        <div class="flex items-center gap-2">
            <span class="text-brand text-2xl"><i class="fa-solid fa-ice-cream"></i></span>
            <h1 class="text-xl font-bold">The Freezing Point</h1>
        </div>
        <div class="hidden md:flex gap-6 text-sm text-gray-300">
            <a href="#" class="hover:text-white">Menu</a>
            <a href="#" class="hover:text-white">Popular</a>
            <a href="#" class="hover:text-white">Offers</a>
        </div>
        <button onclick="toggleCart()" class="bg-brand text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-rose-700 transition">
            <i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span>
        </button>
    </nav>

    <header class="text-center py-20 px-4">
        <p class="text-brand text-sm font-bold tracking-widest uppercase mb-4">Kalyan's Finest Thick Shakes</p>
        <h2 class="text-5xl md:text-7xl font-extrabold mb-6">Cool Down with <br><span class="bg-clip-text text-transparent bg-gradient-to-r from-rose-500 to-purple-500">Freezing Point</span></h2>
        <p class="text-gray-400 max-w-2xl mx-auto mb-8">Premium thick shakes, creamy mastanis, indulgent faloodas & fresh fruit shakes — crafted for the true dessert lover.</p>
        <div class="flex justify-center gap-4">
            <a href="https://wa.me/919960840470" class="bg-brand px-6 py-3 rounded-full font-bold hover:bg-rose-700 transition"><i class="fa-brands fa-whatsapp mr-2"></i> Order on WhatsApp</a>
            <button class="bg-panel border border-zinc-700 px-6 py-3 rounded-full font-bold hover:bg-zinc-800 transition">See Menu</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-24">
        <h3 class="text-xs text-brand font-bold tracking-widest uppercase mb-2">What We Serve</h3>
        <h2 class="text-3xl font-bold mb-8">Our Menu</h2>

        <div class="flex gap-3 mb-8 overflow-x-auto pb-2">
            <button class="bg-brand px-6 py-2 rounded-full text-sm font-bold">All</button>
            <button class="bg-panel border border-zinc-800 px-6 py-2 rounded-full text-sm font-bold hover:bg-zinc-800">Milkshakes</button>
            <button class="bg-panel border border-zinc-800 px-6 py-2 rounded-full text-sm font-bold hover:bg-zinc-800">Falooda</button>
            <button class="bg-panel border border-zinc-800 px-6 py-2 rounded-full text-sm font-bold hover:bg-zinc-800">Cold Coffee</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-grid">
            </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex justify-end">
        <div class="bg-panel w-full md:w-[400px] h-full p-6 flex flex-col border-l border-zinc-800 shadow-2xl transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold" id="modal-title">Your Order</h2>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4">
                </div>

            <div id="checkout-form" class="hidden flex-1 space-y-4">
                <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-darkbg border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none focus:border-brand">
                <input type="text" id="cust-phone" placeholder="Phone Number" class="w-full bg-darkbg border border-zinc-700 rounded-lg px-4 py-3 text-white outline-none focus:border-brand">
            </div>

            <div class="border-t border-zinc-800 pt-4 mt-4">
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>Total</span>
                    <span class="text-brand">₹<span id="cart-total">0</span></span>
                </div>
                <button id="btn-proceed" onclick="showCheckout()" class="w-full bg-brand text-white py-4 rounded-xl font-bold text-lg hover:bg-rose-700 transition">Proceed to Checkout</button>
                <button id="btn-confirm" onclick="confirmOrder()" class="hidden w-full bg-brand text-white py-4 rounded-xl font-bold text-lg hover:bg-rose-700 transition">Confirm Order (COD)</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Lotus Biscoff Thick Shake", desc: "Caramelised cookie blend topped with whipped cream.", price: 300, type: "Milkshake" },
            { id: 2, name: "Dark Oreo Overload", desc: "Crushed Oreos mixed into a velvety thick shake.", price: 180, type: "Milkshake" },
            { id: 3, name: "KitKat Crunch Shake", desc: "Crispy wafer pieces swirled in premium chocolate.", price: 180, type: "Milkshake" },
            { id: 4, name: "Royal Rose Falooda", desc: "Classic rose syrup with vermicelli and sweet basil.", price: 180, type: "Falooda" },
            { id: 5, name: "Kesar Pista Mastani", desc: "Rich saffron and pistachio blended mastani.", price: 220, type: "Mastani" },
            { id: 6, name: "Classic Cold Coffee", desc: "Perfectly brewed strong coffee blended with milk.", price: 160, type: "Cold Coffee" }
        ];

        let cart = [];

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-panel border border-zinc-800 rounded-2xl p-5 hover:border-zinc-600 transition">
                    <h3 class="font-bold text-lg text-white mb-1">${p.name}</h3>
                    <p class="text-sm text-gray-400 mb-4 h-10 line-clamp-2">${p.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-brand font-bold text-xl">₹${p.price}</span>
                        <button onclick="addToCart(${p.id})" class="bg-brand/10 text-brand hover:bg-brand hover:text-white px-4 py-2 rounded-lg font-bold transition">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) existing.qty++;
            else cart.push({ ...product, qty: 1 });
            updateCartUI();
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-total').innerText = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            const cartItemsContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-gray-500 text-center mt-10">Your cart is empty.</p>`;
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-darkbg p-3 rounded-lg border border-zinc-800">
                    <div>
                        <h4 class="font-bold text-sm text-white">${item.name}</h4>
                        <span class="text-brand text-sm font-bold">₹${item.price}</span>
                    </div>
                    <div class="flex items-center gap-3 bg-panel px-2 py-1 rounded-md border border-zinc-700">
                        <button onclick="changeQty(${item.id}, -1)" class="text-gray-400 hover:text-white px-1">-</button>
                        <span class="text-sm font-bold">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="text-gray-400 hover:text-white px-1">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(id, change) {
            const item = cart.find(i => i.id === id);
            item.qty += change;
            if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
            document.getElementById('checkout-form').classList.add('hidden');
            document.getElementById('cart-items').classList.remove('hidden');
            document.getElementById('btn-proceed').classList.remove('hidden');
            document.getElementById('btn-confirm').classList.add('hidden');
            document.getElementById('modal-title').innerText = "Your Order";
        }

        function showCheckout() {
            if(cart.length === 0) return alert("Cart is empty!");
            document.getElementById('cart-items').classList.add('hidden');
            document.getElementById('checkout-form').classList.remove('hidden');
            document.getElementById('btn-proceed').classList.add('hidden');
            document.getElementById('btn-confirm').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Checkout Details";
        }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return alert("Please enter name and phone number!");

            const newOrder = {
                id: Math.random().toString(36).substr(2, 9),
                customer: name,
                phone: phone,
                items: cart.map(i => `${i.qty}x ${i.name}`).join(', '),
                total: cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
                status: 'PENDING'
            };

            // Save to LocalStorage to simulate backend for Admin Dashboard
            let orders = JSON.parse(localStorage.getItem('fp_orders')) || [];
            orders.unshift(newOrder);
            localStorage.setItem('fp_orders', JSON.stringify(orders));

            alert(`Order Confirmed! Thank you ${name}.`);
            cart = [];
            updateCartUI();
            toggleCart();
        }

        renderMenu();
        updateCartUI();
    </script>
</body>
</html>
